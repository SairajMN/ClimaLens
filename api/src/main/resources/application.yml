# ===================================================================
# ClimaLens :: Application Configuration
# ===================================================================
# Load secrets from application-secrets.yml (gitignored) or environment
# ===================================================================

spring:
  application:
    name: climalens

  # PostgreSQL + PostGIS
  datasource:
    url: jdbc:postgresql://localhost:5432/climalens
    username: climalens
    password: climalens
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  # JPA / Hibernate
  jpa:
    defer-datasource-initialization: true  # Let Flyway run before Hibernate validates
    hibernate:
      ddl-auto: none               # Flyway manages schema — disable Hibernate DDL completely
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        spatial:
          db_functions_enabled: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Thymeleaf (MVP frontend)
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  # Mail (SMTP — configure for your provider)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Server
server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_AT_LEAST_256_BITS}
  expiration-ms: 86400000           # 24 hours

# Actuator (health checks for Docker)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

# Resilience4j (global defaults — per-client overrides in client classes)
resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
        cancel-running-future: true

# Logging
logging:
  level:
    root: INFO
    com.climaterisk: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"